version: "3.9"

services:

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./promtail-config.yaml:/etc/promtail/config.yaml
      # Bind mount: comparte la carpeta Logs de VulnerableApp (host) con Promtail
      - C:/Users/herre/source/repos/Solucion01/practicas/VulnerableApp/Logs:/var/log/vulnerableapp
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - observability

networks:
  observability:
    driver: bridge

volumes:
  grafana-data:
  loki-data:
