name: Security

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permite correrlo manualmente desde la pestaña Actions

jobs:
  dast-zap:
    name: DAST — OWASP ZAP
    runs-on: ubuntu-latest

    # SQL Server como "service container": el runner de GitHub Actions es
    # Linux, y la app usa (localdb) por defecto en appsettings.json, que
    # SOLO existe en Windows. Igual que tuvimos que hacer con el contenedor
    # 'pentest-mssql' localmente, aqui necesitamos una instancia real de
    # SQL Server accesible por red.
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Pentest!2026Segg"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $MSSQL_SA_PASSWORD -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build and run app in background
        working-directory: practicas/VulnerableApp
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: http://+:8080
          # Sobreescribe el (localdb) del appsettings.json para apuntar al
          # service container de SQL Server de este mismo job. La app ya
          # aplica migraciones automaticamente al iniciar (Database.Migrate()
          # en Program.cs), asi que la BD y los usuarios de prueba quedan
          # listos solos, sin pasos extra.
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=VulnerableDb;User Id=sa;Password=Pentest!2026Segg;TrustServerCertificate=true;"
        run: |
          dotnet build .
          dotnet run --no-build --no-launch-profile --urls http://+:8080 &
          sleep 15

      - name: Verify app is responding
        run: curl -sf http://localhost:8080/ || (echo "La app no respondio a tiempo" && exit 1)

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-I'

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: report_html.html
        if: always()